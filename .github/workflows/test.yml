name: Run Tests

on:
  pull_request:

jobs:
  test:
    runs-on: nixos-latest

    env:
      ANDROID_HOME: /run/current-system/sw/libexec/android-sdk
      ANDROID_SDK_ROOT: /run/current-system/sw/libexec/android-sdk

    steps:
      - name: Install Node.js (for Actions checkout)
        run: |
          echo "Installing Node.js via Nix..."
          nix-env -iA nixpkgs.nodejs || nix-env -iA nixpkgs.nodejs-20_x || true

      - name: Install Java
        run: |
          echo "Installing Java via Nix..."
          nix-env -iA nixpkgs.jdk21_headless || true

      - name: Install sed
        run: |
          echo "Installing sed via Nix..."
          nix-env -iA nixpkgs.gnused || true

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Tests
        run: ./gradlew test
