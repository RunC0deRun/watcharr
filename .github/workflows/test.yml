name: Run Tests

on:
  pull_request:

jobs:
  test:
    runs-on: nixos-latest

    steps:
      - name: Install Node.js (for Actions checkout)
        run: |
          echo "Installing Node.js via Nix..."
          nix-env -iA nixpkgs.nodejs || nix-env -iA nixpkgs.nodejs-20_x || true

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Tests
        run: ./gradlew test
